steps:
  # Build Docker image with build args from secrets
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY \
          -t us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform:$COMMIT_SHA \
          -t us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform:latest \
          .
    secretEnv:
      - 'NEXT_PUBLIC_SUPABASE_URL'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'panteray-platform'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--port'
      - '3000'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'NEXT_PUBLIC_SUPABASE_URL=supabase-url:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=supabase-anon-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_MAPS_JAVASCRIPT_API=GOOGLE_MAPS_JAVASCRIPT_API:latest'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '80'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/supabase-url/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/supabase-anon-key/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform:$COMMIT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/panteray/platform:latest'

options:
  logging: CLOUD_LOGGING_ONLY
